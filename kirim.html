<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon"
type="image/png"
href="logo.png">

<title>Kirim Aspirasi | Keritik.in</title>

<meta name="description"
content="Keritik.in adalah platform aspirasi publik Indonesia untuk menyampaikan kritik, saran, dan apresiasi secara konstruktif.">

<meta property="og:title"
content="Keritik.in">

<meta property="og:description"
content="Suara rakyat untuk Indonesia yang lebih baik.">

<meta property="og:type"
content="website">

<meta property="og:image"
content="https://keritikin.github.io/logo.png">

<link rel="stylesheet" href="style.css">

<style>

.form-container{
    max-width:800px;
    margin:60px auto;
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 4px 20px rgba(0,0,0,.08);
}

.form-title{
    text-align:center;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:16px;
}

textarea{
    min-height:180px;
}

.submit-btn{
    width:100%;
    background:#c62828;
    color:white;
    border:none;
    padding:15px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

.submit-btn:hover{
    opacity:.9;
}

.notice{
    background:#fff3cd;
    padding:15px;
    border-radius:8px;
    margin-bottom:20px;
}

</style>
</head>
    
<body>

<nav class="page-navbar">

    <div class="page-logo">
        <img src="logo.png" alt="Keritik.in">
    </div>

    <div class="page-menu">
        <a href="index.html">Beranda</a>
        <a href="aspirasi.html">Aspirasi</a>
        <a href="kirim.html">Kirim Aspirasi</a>
        <a href="tentang.html">Tentang</a>
    
        <button id="themeToggle" class="theme-toggle" type="button">
            🌙
        </button>
    </div>

</nav>

<div class="form-container">

    <div class="form-title">
        <h1>📝 Kirim Aspirasi</h1>
        <p>Sampaikan kritik, saran, atau apresiasi anda.</p>
    </div>

    <div class="notice">
        Aspirasi akan ditinjau sebelum dipublikasikan.
    </div>

    <form id="aspirasiForm">

        <div class="form-group">
            <label>Nama Pengguna (Opsional)</label>
            <input id="username" type="text" placeholder="Contoh: rakyatbiasa">
        </div>

        <div class="form-group">
    <label>Provinsi</label>

    <input
        id="provinsi"
        list="daftarProvinsi"
        placeholder="Pilih atau ketik provinsi">

    <datalist id="daftarProvinsi">
        <option value="Aceh">
        <option value="Sumatera Utara">
        <option value="Sumatera Barat">
        <option value="Riau">
        <option value="Kepulauan Riau">
        <option value="Jambi">
        <option value="Bengkulu">
        <option value="Sumatera Selatan">
        <option value="Kepulauan Bangka Belitung">
        <option value="Lampung">

        <option value="DKI Jakarta">
        <option value="Banten">
        <option value="Jawa Barat">
        <option value="Jawa Tengah">
        <option value="DI Yogyakarta">
        <option value="Jawa Timur">

        <option value="Bali">
        <option value="Nusa Tenggara Barat">
        <option value="Nusa Tenggara Timur">

        <option value="Kalimantan Barat">
        <option value="Kalimantan Tengah">
        <option value="Kalimantan Selatan">
        <option value="Kalimantan Timur">
        <option value="Kalimantan Utara">

        <option value="Sulawesi Utara">
        <option value="Gorontalo">
        <option value="Sulawesi Tengah">
        <option value="Sulawesi Barat">
        <option value="Sulawesi Selatan">
        <option value="Sulawesi Tenggara">

        <option value="Maluku">
        <option value="Maluku Utara">

        <option value="Papua">
        <option value="Papua Barat">
        <option value="Papua Barat Daya">
        <option value="Papua Tengah">
        <option value="Papua Pegunungan">
        <option value="Papua Selatan">
    </datalist>
</div>

        <div class="form-group">
    <label>Kabupaten / Kota (Opsional)</label>

    <input
        id="kabupaten"
        type="text"
        placeholder="Contoh: Medan, Bandung, Jayapura">
</div>
        
        <div class="form-group">
            <label>Kategori</label>

            <select id="kategori">
                <option>Kritik</option>
                <option>Saran</option>
                <option>Apresiasi</option>
            </select>
        </div>

        <div class="form-group">
    <label>Topik Aspirasi</label>

    <select id="topik">
        <option>Pendidikan</option>
        <option>Kesehatan</option>
        <option>Transportasi</option>
        <option>Ekonomi</option>
        <option>Lingkungan</option>
        <option>Teknologi</option>
        <option>Pelayanan Publik</option>
        <option>Infrastruktur</option>
        <option>Lainnya</option>
    </select>
</div>
        
        <div class="form-group">
            <label>Judul Aspirasi</label>
            <input id="judul" type="text">
        </div>

        <div class="form-group">
            <label>Isi Aspirasi</label>
            <textarea id="isi"></textarea>
        </div>

        <button type="submit" class="submit-btn">
            Kirim Aspirasi
        </button>

    </form>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCRdkMGgb1s5n90FwMmDSL9WyHWPJeOMJ0",
  authDomain: "keritik-in.firebaseapp.com",
  projectId: "keritik-in",
  storageBucket: "keritik-in.firebasestorage.app",
  messagingSenderId: "428678412439",
  appId: "1:428678412439:web:3daaf22b775b9b00a191d2",
  measurementId: "G-E04Y0KK0WM"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document
.getElementById("aspirasiForm")
.addEventListener("submit", async (e) => {

  e.preventDefault();

  try {

    await addDoc(
      collection(db, "aspirasi"),
      {
        username: document.getElementById("username").value || "Anonim",
        provinsi: document.getElementById("provinsi").value,
        kabupaten: document.getElementById("kabupaten").value,
        kategori: document.getElementById("kategori").value,
        topik: document.getElementById("topik").value,
        judul: document.getElementById("judul").value,
        isi: document.getElementById("isi").value,
        tanggal: new Date().toLocaleDateString("id-ID"),
        
        status: "pending",
        createdAt: serverTimestamp()
      }
    );

    alert("🎉 Aspirasi berhasil dikirim!");

    document.getElementById("aspirasiForm").reset();

  } catch (error) {

    console.error(error);

    alert("❌ Gagal mengirim aspirasi");

  }

});
</script>

<script src="theme.js"></script>

</body>
</html>
