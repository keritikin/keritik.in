<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aspirasi Publik | Keritik.in</title>

<link rel="stylesheet" href="style.css">

<style>

.page{
    max-width:1000px;
    margin:50px auto;
    padding:20px;
}

.hero{
    text-align:center;
    margin-bottom:40px;
}

.hero p{
    color:#666;
    margin-top:10px;
}

.search-box{
    margin-bottom:30px;
}

.search-box input{
    width:100%;
    padding:15px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:16px;
}
    
#aspirasiList{
    display:flex;
    flex-direction:column;
    gap:20px;
}
    
.card{
    background:white;
    padding:25px;
    margin-bottom:20px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,.08);

    max-width:700px;
    width:100%;
}

.badge{
    display:inline-block;
    padding:5px 10px;
    border-radius:20px;
    font-size:14px;
    margin-bottom:10px;
}

.kritik{
    background:#ffebee;
}

.saran{
    background:#e8f5e9;
}

.apresiasi{
    background:#e3f2fd;
}

.meta{
    color:#666;
    font-size:14px;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="page">

<div class="hero">
    <h1>📖 Aspirasi Publik</h1>
    <p>
        Kumpulan kritik, saran, dan apresiasi dari masyarakat Indonesia.
    </p>
</div>

    <div class="search-box">

    <input
        type="text"
        id="searchInput"
        placeholder="🔍 Cari aspirasi...">

</div>
    
<div id="aspirasiList">

</div>

</div>
    
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCRdkMGgb1s5n90FwMmDSL9WyHWPJeOMJ0",
  authDomain: "keritik-in.firebaseapp.com",
  projectId: "keritik-in",
  storageBucket: "keritik-in.firebasestorage.app",
  messagingSenderId: "428678412439",
  appId: "1:428678412439:web:3daaf22b775b9b00a191d2",
  measurementId: "G-E04Y0KK0WM"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const snapshot =
await getDocs(collection(db, "aspirasi"));

const list =
document.getElementById("aspirasiList");

let semuaAspirasi = [];

snapshot.forEach((doc) => {

    const data = doc.data();

    if (data.status === "published") {
        semuaAspirasi.push(data);
    }

});

tampilkanAspirasi(semuaAspirasi);

    function tampilkanAspirasi(dataAspirasi){

    const list =
    document.getElementById("aspirasiList");

    list.innerHTML = "";

    dataAspirasi.forEach((data)=>{

        list.innerHTML += `

        <div class="aspirasi-card">

            <div class="badge ${data.kategori.toLowerCase()}">
                ${data.kategori}
            </div>

            <h2>${data.judul}</h2>

            <p>${data.isi}</p>

            <div class="meta">

                👤 ${data.username}

                <br>

                📍 ${data.kabupaten || "-"},
                ${data.provinsi || "-"}

                <br>

                🏷️ ${data.topik || "-"}

                <br>

                📅 ${data.tanggal || "-"}

            </div>

        </div>

        `;

    });

}

const data = doc.data();

list.innerHTML += `

<div class="card">

<div class="badge ${data.kategori.toLowerCase()}">
${data.kategori}
</div>

<h2>${data.judul}</h2>

<p>${data.isi}</p>

<div class="meta">

👤 ${data.username}

<br>

📍 ${data.kabupaten || "-"},
${data.provinsi || "-"}

<br>

🏷️ ${data.topik || "-"}

<br>

📅 ${data.tanggal || "-"}

</div>

</div>

`;

});

    document
.getElementById("searchInput")
.addEventListener("input", (e)=>{

    const keyword =
    e.target.value.toLowerCase();

    const hasil =
    semuaAspirasi.filter(item =>

        item.judul?.toLowerCase().includes(keyword) ||

        item.isi?.toLowerCase().includes(keyword) ||

        item.topik?.toLowerCase().includes(keyword)

    );

    tampilkanAspirasi(hasil);

});
    
</script>
  
</body>
</html>
