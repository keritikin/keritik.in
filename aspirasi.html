<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aspirasi Publik | Keritik.in</title>

<link rel="stylesheet" href="style.css">

<style>

.page{
    max-width:1000px;
    margin:50px auto;
    padding:20px;
}

.hero{
    text-align:center;
    margin-bottom:40px;
}

.hero p{
    color:#666;
    margin-top:10px;
}

.search-box{
    margin-bottom:30px;
}

.search-box input{
    width:100%;
    padding:15px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:16px;
}
    
#aspirasiList{
    display:flex;
    flex-direction:column;
    gap:20px;
}
    
.card{
    background:white;
    padding:25px;
    margin-bottom:20px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,.08);

    max-width:700px;
    width:100%;
}

.badge{
    display:inline-block;
    padding:5px 10px;
    border-radius:20px;
    font-size:14px;
    margin-bottom:10px;
}

.kritik{
    background:#ffebee;
}

.saran{
    background:#e8f5e9;
}

.apresiasi{
    background:#e3f2fd;
}

.meta{
    color:#666;
    font-size:14px;
    margin-top:10px;
}

.filter-box{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:30px;
}

.filter-btn{
    border:none;
    padding:10px 18px;
    border-radius:20px;
    background:white;
    cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.filter-btn.active{
    background:#c62828;
    color:white;
}

</style>

</head>

<body>

<div class="page">

<div class="hero">
    <h1>📖 Aspirasi Publik</h1>
    <p>
        Kumpulan kritik, saran, dan apresiasi dari masyarakat Indonesia.
    </p>
</div>

    <div class="search-box">

    <input
        type="text"
        id="searchInput"
        placeholder="🔍 Cari aspirasi...">

</div>

<div class="filter-box">

    <button class="filter-btn active" data-filter="Semua">
        Semua
    </button>

    <button class="filter-btn" data-filter="Kritik">
        Kritik
    </button>

    <button class="filter-btn" data-filter="Saran">
        Saran
    </button>

    <button class="filter-btn" data-filter="Apresiasi">
        Apresiasi
    </button>

</div>

<div id="aspirasiList">

</div>

</div>
    
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs,
    query,
    where
}
from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCRdkMGgb1s5n90FwMmDSL9WyHWPJeOMJ0",
  authDomain: "keritik-in.firebaseapp.com",
  projectId: "keritik-in",
  storageBucket: "keritik-in.firebasestorage.app",
  messagingSenderId: "428678412439",
  appId: "1:428678412439:web:3daaf22b775b9b00a191d2",
  measurementId: "G-E04Y0KK0WM"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const q = query(
    collection(db, "aspirasi"),
    where("status", "==", "published")
);

const snapshot = await getDocs(q);

let semuaAspirasi = [];

snapshot.forEach((doc) => {
    const data = doc.data();

    if (data.status === "published") {
        semuaAspirasi.push(data);
    }
});

tampilkanAspirasi(semuaAspirasi);

function tampilkanAspirasi(dataAspirasi){

    const list = document.getElementById("aspirasiList");

    list.innerHTML = "";

    if(dataAspirasi.length === 0){
        list.innerHTML = "<p>Belum ada aspirasi yang dipublikasikan.</p>";
        return;
    }

    dataAspirasi.forEach((data)=>{

        list.innerHTML += `

        <div class="aspirasi-card">

            <div class="badge ${data.kategori.toLowerCase()}">
                ${data.kategori}
            </div>

            <h2>${data.judul}</h2>

            <p>${data.isi}</p>

            <div class="meta">
                👤 ${data.username}
                <br>
                📍 ${data.kabupaten || "-"}, ${data.provinsi || "-"}
                <br>
                🏷️ ${data.topik || "-"}
                <br>
                📅 ${data.tanggal || "-"}
            </div>

        </div>

        `;

    });

}

document
.getElementById("searchInput")
.addEventListener("input", (e)=>{

    const keyword = e.target.value.toLowerCase();

    const hasil = semuaAspirasi.filter(item =>
        item.judul?.toLowerCase().includes(keyword) ||
        item.isi?.toLowerCase().includes(keyword) ||
        item.topik?.toLowerCase().includes(keyword) ||
        item.kategori?.toLowerCase().includes(keyword) ||
        item.provinsi?.toLowerCase().includes(keyword)
    );

    tampilkanAspirasi(hasil);

});

const filterButtons =
document.querySelectorAll(".filter-btn");

filterButtons.forEach((button)=>{

    button.addEventListener("click", ()=>{

        filterButtons.forEach(btn =>
            btn.classList.remove("active")
        );

        button.classList.add("active");

        const filter =
        button.dataset.filter;

        if(filter === "Semua"){

            tampilkanAspirasi(semuaAspirasi);

        }else{

            const hasil =
            semuaAspirasi.filter(item =>
                item.kategori === filter
            );

            tampilkanAspirasi(hasil);

        }

    });

});

</script>
  
</body>
</html>
